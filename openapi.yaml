openapi: 3.0.3
info:
  title: Accounting Tool API
  version: 1.3.0
  description: 可直接导入 Apifox 的 OpenAPI 文件，已接入家庭化、生活模块、请求校验与图片上传。
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterReq:
      type: object
      required: [email, password, name, role]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
        name: { type: string, maxLength: 50 }
        role: { type: string, enum: [husband, wife] }
    LoginReq:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshReq:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
    CoupleReq:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [husband, wife] }
    JoinReq:
      type: object
      required: [inviteCode]
      properties:
        inviteCode: { type: string, minLength: 6, maxLength: 6 }
    RecordReq:
      type: object
      required: [amount, type, category, person, date]
      properties:
        amount: { type: number }
        type: { type: string, enum: [income, expense] }
        category: { type: string }
        person: { type: string, enum: [husband, wife] }
        date: { type: string, example: '2026-04-07' }
        note: { type: string, maxLength: 500 }
    RecordUpdateReq:
      type: object
      properties:
        amount: { type: number }
        type: { type: string, enum: [income, expense] }
        category: { type: string }
        person: { type: string, enum: [husband, wife] }
        date: { type: string }
        note: { type: string, maxLength: 500 }
    DiaryReq:
      type: object
      required: [title, content]
      properties:
        title: { type: string, maxLength: 100 }
        content: { type: string }
        location: { type: string, maxLength: 100 }
        mood: { type: string, maxLength: 50 }
        image: { type: string, format: uri }
    PhotoReq:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        title: { type: string, maxLength: 100 }
        category: { type: string, maxLength: 50 }
    PhotoUploadReq:
      type: object
      required: [fileName, fileData, contentType]
      properties:
        fileName: { type: string, example: 'banner.png' }
        fileData: { type: string, description: 'base64 字符串，可带 data:image/png;base64, 前缀' }
        contentType: { type: string, example: 'image/png' }
        title: { type: string, maxLength: 100 }
        category: { type: string, maxLength: 50 }
    WishReq:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 100 }
        description: { type: string, maxLength: 1000 }
        price: { type: number, minimum: 0 }
        category: { type: string, maxLength: 50 }
    WishStatusReq:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, completed] }
    AnniversaryReq:
      type: object
      required: [name, date]
      properties:
        name: { type: string, maxLength: 100 }
        date: { type: string, example: '2026-04-07' }
        description: { type: string, maxLength: 1000 }
paths:
  /api/auth/register:
    post:
      tags: [Auth]
      security: []
      summary: 注册
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterReq' }
      responses:
        '201': { description: ok }
  /api/auth/login:
    post:
      tags: [Auth]
      security: []
      summary: 登录
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginReq' }
      responses:
        '200': { description: ok }
  /api/auth/logout:
    post:
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      summary: 登出
      responses:
        '200': { description: ok }
  /api/auth/me:
    get:
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      summary: 当前用户
      responses:
        '200': { description: ok }
  /api/auth/refresh-access-token:
    post:
      tags: [Auth]
      security: []
      summary: 刷新 token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshReq' }
      responses:
        '200': { description: ok }
  /api/families:
    post:
      tags: [Families]
      security: [{ BearerAuth: [] }]
      summary: 创建家庭
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CoupleReq' }
      responses:
        '201': { description: ok }
  /api/families/join:
    post:
      tags: [Families]
      security: [{ BearerAuth: [] }]
      summary: 加入家庭
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JoinReq' }
      responses:
        '200': { description: ok }
  /api/families/current:
    get:
      tags: [Families]
      security: [{ BearerAuth: [] }]
      summary: 当前家庭信息
      responses:
        '200': { description: ok }
  /api/diaries:
    get:
      tags: [Diaries]
      security: [{ BearerAuth: [] }]
      summary: 日记列表
      responses:
        '200': { description: ok }
    post:
      tags: [Diaries]
      security: [{ BearerAuth: [] }]
      summary: 创建日记
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DiaryReq' }
      responses:
        '201': { description: ok }
  /api/diaries/{id}:
    get:
      tags: [Diaries]
      security: [{ BearerAuth: [] }]
      summary: 日记详情
      responses:
        '200': { description: ok }
    put:
      tags: [Diaries]
      security: [{ BearerAuth: [] }]
      summary: 兼容旧接口-更新日记
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DiaryReq' }
      responses:
        '200': { description: ok }
    delete:
      tags: [Diaries]
      security: [{ BearerAuth: [] }]
      summary: 兼容旧接口-删除日记
      responses:
        '200': { description: ok }
  /api/diaries/{id}/update:
    post:
      tags: [Diaries]
      security: [{ BearerAuth: [] }]
      summary: 更新日记
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DiaryReq' }
      responses:
        '200': { description: ok }
  /api/diaries/{id}/delete:
    post:
      tags: [Diaries]
      security: [{ BearerAuth: [] }]
      summary: 删除日记
      responses:
        '200': { description: ok }
  /api/photos:
    get:
      tags: [Photos]
      security: [{ BearerAuth: [] }]
      summary: 照片列表
      responses:
        '200': { description: ok }
    post:
      tags: [Photos]
      security: [{ BearerAuth: [] }]
      summary: 创建照片
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhotoReq' }
      responses:
        '201': { description: ok }
  /api/photos/upload:
    post:
      tags: [Photos]
      security: [{ BearerAuth: [] }]
      summary: 上传照片(base64)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhotoUploadReq' }
      responses:
        '201': { description: ok }
  /api/photos/banner:
    get:
      tags: [Photos]
      security: [{ BearerAuth: [] }]
      summary: banner 照片
      responses:
        '200': { description: ok }
  /api/photos/category/{category}:
    get:
      tags: [Photos]
      security: [{ BearerAuth: [] }]
      summary: 分类照片
      responses:
        '200': { description: ok }
  /api/photos/{id}/delete:
    post:
      tags: [Photos]
      security: [{ BearerAuth: [] }]
      summary: 删除照片
      responses:
        '200': { description: ok }
  /api/wishes:
    get:
      tags: [Wishes]
      security: [{ BearerAuth: [] }]
      summary: 心愿列表
      responses:
        '200': { description: ok }
    post:
      tags: [Wishes]
      security: [{ BearerAuth: [] }]
      summary: 创建心愿
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WishReq' }
      responses:
        '201': { description: ok }
  /api/wishes/{id}/update:
    post:
      tags: [Wishes]
      security: [{ BearerAuth: [] }]
      summary: 更新心愿
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WishReq' }
      responses:
        '200': { description: ok }
  /api/wishes/{id}/status:
    post:
      tags: [Wishes]
      security: [{ BearerAuth: [] }]
      summary: 更新心愿状态
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WishStatusReq' }
      responses:
        '200': { description: ok }
  /api/wishes/{id}/delete:
    post:
      tags: [Wishes]
      security: [{ BearerAuth: [] }]
      summary: 删除心愿
      responses:
        '200': { description: ok }
  /api/anniversaries:
    get:
      tags: [Anniversaries]
      security: [{ BearerAuth: [] }]
      summary: 纪念日列表
      responses:
        '200': { description: ok }
    post:
      tags: [Anniversaries]
      security: [{ BearerAuth: [] }]
      summary: 创建纪念日
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnniversaryReq' }
      responses:
        '201': { description: ok }
  /api/anniversaries/{id}/update:
    post:
      tags: [Anniversaries]
      security: [{ BearerAuth: [] }]
      summary: 更新纪念日
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AnniversaryReq' }
      responses:
        '200': { description: ok }
  /api/anniversaries/{id}/delete:
    post:
      tags: [Anniversaries]
      security: [{ BearerAuth: [] }]
      summary: 删除纪念日
      responses:
        '200': { description: ok }
